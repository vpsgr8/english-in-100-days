name: Sync to vpsgr8.github.io

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-user-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate production config
        run: node scripts/generate-config.js
        env:
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_RAZORPAY_PAYMENT_LINK: ${{ secrets.VITE_RAZORPAY_PAYMENT_LINK }}
          VITE_TRIAL_DAYS: ${{ secrets.VITE_TRIAL_DAYS }}
          VITE_PREMIUM_AMOUNT: ${{ secrets.VITE_PREMIUM_AMOUNT }}
          VITE_ADSENSE_CLIENT_ID: ${{ secrets.VITE_ADSENSE_CLIENT_ID }}
          VITE_ADSENSE_BANNER_SLOT: ${{ secrets.VITE_ADSENSE_BANNER_SLOT }}

      - name: Add .nojekyll
        run: touch mvp/.nojekyll

      - name: Verify ads.txt before deploy
        run: |
          grep -q 'pub-5121623665404680' mvp/ads.txt || { echo 'ads.txt missing publisher ID'; exit 1; }

      - name: Deploy to vpsgr8.github.io (main)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: vpsgr8/vpsgr8.github.io
          publish_branch: main
          publish_dir: ./mvp
          force_orphan: true
