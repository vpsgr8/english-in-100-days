name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate production config
        run: node scripts/generate-config.js
        env:
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_RAZORPAY_PAYMENT_LINK: ${{ secrets.VITE_RAZORPAY_PAYMENT_LINK }}
          VITE_TRIAL_DAYS: ${{ secrets.VITE_TRIAL_DAYS }}
          VITE_PREMIUM_AMOUNT: ${{ secrets.VITE_PREMIUM_AMOUNT }}

      - name: Add .nojekyll for GitHub Pages
        run: touch mvp/.nojekyll

      # Publishes mvp/ folder to gh-pages branch (site root = app)
      - name: Deploy app to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mvp
          force_orphan: true
