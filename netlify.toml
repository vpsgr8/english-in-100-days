[build]
  publish = "mvp"
  command = "node scripts/generate-config.js || echo 'No env vars — demo mode'"

# Production domain (update after Netlify domain setup)
# [context.production.environment]
#   SITE_URL = "https://englishin100days.in"

# Admin panel + static assets (served before SPA fallback)
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/lessons.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
